apiVersion: v1
kind: Pod
metadata:
  name: parent-probe
spec:
  hostPID: true
  nodeSelector:
    kubernetes.azure.com/agentpool: katacc
  containers:
    - name: probe
      image: ubuntu:24.04
      command: ["sleep", "infinity"]
      securityContext:
        privileged: true
      volumeMounts:
        - { name: host, mountPath: /host }
  volumes:
    - { name: host, hostPath: { path: / } }
